services:
  voice-worker:
    build: .
    ports:
      - "${VOICE_WORKER_PORT:-8787}:8787"
    environment:
      PORT: 8787
      PIPER_BIN: /usr/local/bin/piper
      PIPER_MODEL_PATH: /models/en_GB-alan-medium.onnx
      VOICE_SYNTHESIS_TOKEN: ${VOICE_SYNTHESIS_TOKEN:-}
    restart: unless-stopped
