services:
  kokoro:
    image: hangrylabs/kokorotts:v0.2
    restart: unless-stopped

  voice-worker:
    build: .
    ports:
      - "${VOICE_WORKER_PORT:-8787}:8787"
    environment:
      PORT: 8787
      VOICE_ENGINE: kokoro
      KOKORO_URL: http://kokoro:7860
      KOKORO_VOICE: bm_george
      # 1.0 = Kokoro default; tune to taste (0.5–2.0)
      KOKORO_SPEED: "1.2"
      VOICE_SYNTHESIS_TOKEN: ${VOICE_SYNTHESIS_TOKEN:-}
    depends_on:
      - kokoro
    restart: unless-stopped
